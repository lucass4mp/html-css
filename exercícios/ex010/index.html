<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mídias em HTML</title>
</head>
<body>
  <h1>Imagens dinâmicas</h1>
  <p>Tente abri esse site em varios dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>

  <picture>
    <source media="(max-width: 750px)" srcset="imagens/imagemp.png" type="image/png">
    <source media="(max-width: 1050px)" srcset="imagens/imagemm.png" type="image/png">
    <img src="imagens/imagemg.png" alt="Imagem flexível">
  </picture>
  
  <h1>Reproduzindo Áudio</h1>
  <p>Vamos aprender a reproduzir áudios em HTML5<p/> 
    <audio preload="metadata" autoplay controls loop>
      <source src="midias/1973 - Bruno E..mp3" type="audio/mp3">
      <source src="midias/1973 - Bruno E..ogg" type="audio/ogg">
      <source src="midias/1973 - Bruno E..wav" type="audio/wav">
      <p>Infelizmente seu navegador não consgue reproduzir o áudio. <a href="midias/1973 - Bruno E..mp3">Clique aqui para baixar o arquivo MP3</a> </p>

    </audio>
</body>
</html>
