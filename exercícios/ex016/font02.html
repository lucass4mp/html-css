<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fontes externas</title>
  <style>
    @font-face{
       font-family: 'Love';
       src: url(fontes/love\ larry\ ttf.ttf) format(truetype);
       font-weight: normal;
       font-style: normal;
       /*
         Tipos de format()
         - opentype (otf)
         -truetype (ttf)
         -embedded-opentyp
         -trustype-aat (Apple Advanced Typography)
         -svg
         */
    }
    body{
      font-family: Arial, Helvetica, sans-serif;
    }

    h1{
      font-family: 'Love', Times, serif;
      font-size: 3em;
    }
  </style>
</head>
<body>
  <h1>Título</h1>
  <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Hic error, sapiente, quo ut doloremque aut similique itaque, ipsam tempora sequi consequuntur nihil pariatur tenetur nobis! Nesciunt quis enim iste quod!</p>
  
</body>
</html>
