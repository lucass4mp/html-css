<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VÍdeos com HTML5</title>
</head>
<body>
  <h1>Inserindo vídeos hospedados localmente</h1>
  <p>Este vídeo esta hospedado no meu próprio servidor.</p>
  <video controls width="500" poster="imagens/capa.jpg">
    <source src="midia/meu-mideo.mkv" type="video/mkb">
    <source src="midia/meu-mideo.webm" type="video/webm">
    <source src="midia/meu-video.mp4" type="video/mp4">
    <source src="midia/meu-video.ogv" type="video/ogv">
    <p>Seu navegador não é compativel</p>
 </video>
 <h1>Inserindo videos do youtube</h1>
 <iframe width="560" height="315" src="https://www.youtube.com/embed/YJl56GEoGqg?si=2g4zYzVlYszlaYLf" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"  allowfullscreen></iframe>
  
</body>
</html>
